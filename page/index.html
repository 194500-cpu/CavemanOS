<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Caveman Web OS</title>
    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

</head>

<body
    style="background-image: url('./cavewall.jpg'); background-repeat: no-repeat; background-position: center; background-size: contain; background-color: #222; height: 100vh; width: 100vw; margin: 0; background-color: rgba(0, 0, 0, 0.15); background-size: 200vh 100vw;">
    <div name="navbar" style="display: flex; justify-content: space-between; background-color: rgb(0, 0, 0)">

        <h1 style="color:white; font-size: 1.5rem; margin-left: 1rem; font-family: 'Caveat', cursive;">
            <strong>Caveman Web OS</strong>
        </h1>

        <h1 id="currentTime"
            style="color: white; font-size: 1.5rem; margin-right: 1rem; font-family: 'Montserrat', sans-serif;">
            00:00 AM - 01/01/2000BC
        </h1>
    </div>

    <div name="dock"
        style="background-color: rgba(0, 0, 0, 0.8); height: 60px; position: absolute; bottom: 1%; left: 50%; width: 90%; transform: translateX(-50%); display: flex; justify-content: center; align-items: center; border-radius: 1rem;">

        <h1 style="color: white; font-size: 1.2rem; margin: 0; font-family: 'Montserrat', sans-serif;">
            <div id="campfireIcon">
                <img src="./campfire_icon.svg" alt="Campfire Icon"
                    style="height: 3rem; width: 3rem; border-radius: 0.5rem; padding-top: 0.3rem;"
                    >
            </div>
        </h1>
    </div>

    <div id="campfire" style="height: 25rem; width: 56rem; background-color: rgba(200, 200, 200, 0.9); position: fixed;">
        <div id="campfireheader" style="display: flex;background-color: rgb(255, 255, 255); padding: 0.5rem; height: 1rem; width: 55rem;">
            <span style="display: flex; cursor: pointer; width: 1rem; height: 1rem; margin-right: 0.5rem;" id="campfireclose"><img src="./Red-X-Icon.png" alt="Close Icon" style="width: 1rem; height: 1rem;"></span>
            Campfire - Share a message with other cavemen!
        </div>
        <p style="padding: 0.5rem;">
            
            CONTENT GOES HERE
        </p>

    </div>


</body>
<script src="script.js"></script>
</html>
