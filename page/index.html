<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Caveman Web OS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body style="background-image: url('./cavewall.jpg'); background-repeat: no-repeat; background-position: center; background-size: contain; background-color: #222; height: 100vh; width: 100vw; margin: 0; background-color: rgba(0, 0, 0, 0.15); background-size: 200vh 100vw;">
    <div name="navbar" style="display: flex; justify-content: space-between; background-color: rgb(0, 0, 0)">

        <h1 style="color:white; font-size: 1.5rem; margin-left: 1rem;">
            <strong>Caveman Web OS</strong>
        </h1>
        
        <h1 id="currentTime" style="color: white; font-size: 1.5rem; margin-right: 1rem;">
            00:00 AM - 01/01/2000BC
        </h1>
    </div>
    <script>
        function updateTime() {
            var currentTime = new Date().toLocaleString();
            var timeText = document.querySelector("#currentTime");
            timeText.innerHTML = currentTime;
        }
        setInterval(updateTime, 1000);
    </script>

</body>

</html>
